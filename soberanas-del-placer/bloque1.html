<style>

  .sdp-section * {

  }

  html {

  }

  .sdp-section {
    padding: 24px;
    color: var(--sdp-text);
    font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
  }

  .sdp-container {
    width: 100%;
    max-width: var(--sdp-container);
    margin: 0 auto;
  }

  .sdp-eyebrow {
    margin: 0 0 18px;
    color: var(--sdp-berry);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  .sdp-section h1,
  .sdp-section h2 {
    margin: 0;
    color: var(--sdp-burgundy);
    font-family: Georgia, "Times New Roman", serif;
    font-weight: 700;
    line-height: 0.95;
    letter-spacing: -0.04em;
  }

  .sdp-section h1 {
    font-size: clamp(40px, 5vw, 70px);
    max-width: 760px;
    margin-left: auto;
    margin-right: auto;
  }

  .sdp-section h2 {
    font-size: clamp(30px, 4vw, 50px);
  }

  .sdp-section p {
    color: var(--sdp-text);
    font-size: 17px;
    line-height: 1.75;
  }

  .sdp-hero {
    padding-top: 110px;
    padding-bottom: 70px;
  }

  .sdp-hero-content {
    max-width: 820px;
    margin: 0 auto;
    text-align: center;
  }

  .sdp-emojis {
    margin-top: 24px;
    font-size: 26px;
    letter-spacing: 0.4em;
  }

  .sdp-lead {
    max-width: 520px;
    margin: 24px auto 0;
  }

  @media (max-width: 1024px) {
    .sdp-section {
      padding: 50px 22px;
    }
  }

  @media (max-width: 640px) {
    .sdp-section {
      padding: 56px 18px;
    }

    .sdp-hero {
      padding-top: 70px;
      padding-bottom: 48px;
    }

    .sdp-section h1 {
      font-size: clamp(40px, 12vw, 50px);
    }

    .sdp-section p {
      font-size: 16px;
    }

    .sdp-emojis {

  </div>
