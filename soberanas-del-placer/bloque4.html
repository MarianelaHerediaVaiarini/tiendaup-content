<style>
  .sdp-gallery-section {
    padding-bottom: 22px;
  }

  .sdp-section-heading {
    text-align: center;
    margin-bottom: 48px;
  }

  .sdp-section-heading h2 {
    max-width: 820px;
    margin: 0 auto;
  }
  .galeria-responsive {
    width: 100%;
    column-count: 4;
    column-gap: 8px;
    padding: 8px;
    box-sizing: border-box;
  }

  .galeria-responsive img {
    width: 100%;
    height: auto;
    display: block;
    margin-bottom: 8px;
    border-radius: 8px;
    break-inside: avoid;
    object-fit: cover;
  }

  .galeria-responsive img:hover {
    transform: scale(1.02);
    transition: transform 0.25s ease;
  }

  @media (max-width: 1100px) {
    .galeria-responsive {
      column-count: 3;
    }
  }

  @media (max-width: 700px) {
    .galeria-responsive {
      column-count: 2;
      column-gap: 6px;
      padding: 6px;
    }

    .galeria-responsive img {
      margin-bottom: 6px;
      border-radius: 6px;
    }
  }

  @media (max-width: 420px) {
    .galeria-responsive {
      column-count: 2;
      column-gap: 4px;
      padding: 4px;
    }

    .galeria-responsive img {
      margin-bottom: 4px;
      border-radius: 5px;
    }
  }
</style>

<section class="sdp-section sdp-gallery-section" id="momentos">

</section>
